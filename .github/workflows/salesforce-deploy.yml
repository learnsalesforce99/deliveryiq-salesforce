name: Salesforce Deploy

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: 'Target org alias (e.g., healthdev)'
        required: true
        default: 'healthdev'
      test_level:
        description: 'Test level'
        required: true
        default: 'RunLocalTests'
        type: choice
        options:
          - NoTestRun
          - RunLocalTests
          - RunAllTestsInOrg
      check_only:
        description: 'Validate only (no actual deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'
      - 'manifest/**'

jobs:
  deploy:
    name: Deploy Changed Files to Salesforce
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (with full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > ./auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./auth-url.txt --alias target-org --set-default
          rm ./auth-url.txt

      - name: Detect changed Salesforce files
        id: changed_files
        run: |
          # For workflow_dispatch: deploy all force-app content
          # For push: deploy only changed files vs previous commit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — deploying all force-app directories..."
            CHANGED=$(find force-app -name '*.xml' | tr '\n' ' ')
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

            # Roll up to correct deploy level for all files
            DIRS=$(find force-app -name '*.xml' | while read FILE; do
              if echo "$FILE" | grep -qE 'force-app/main/default/objects/[^/]+/(fields|validationRules|recordTypes|listViews|compactLayouts|fieldSets|webLinks|sharingReasons|businessProcesses)/'; then
                echo "$FILE" | sed -E 's|(force-app/main/default/objects/[^/]+)/.*|\1|'
              else
                dirname "$FILE"
              fi
            done | sort -u | tr '\n' ',')
            DIRS="${DIRS%,}"
            echo "Deploy dirs: $DIRS"
            echo "deploy_dirs=$DIRS" >> $GITHUB_OUTPUT
          else
            # Get files changed in this push/merge vs previous commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'force-app/**' | tr '\n' ' ')
            echo "Changed files: $CHANGED"

            if [ -z "$CHANGED" ]; then
              echo "No Salesforce files changed. Skipping deploy."
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

              # Build unique list of deployable component directories.
              # Strategy: roll up to the correct Salesforce metadata container level:
              #   - Objects (fields, validationRules, etc.) → deploy the whole object dir
              #     e.g. force-app/main/default/objects/Customer__c/fields/X.field-meta.xml
              #          → force-app/main/default/objects/Customer__c
              #   - Top-level types (classes, triggers, lwc, etc.) → deploy the type dir
              #     e.g. force-app/main/default/classes/MyClass.cls
              #          → force-app/main/default/classes
              DIRS=$(git diff --name-only HEAD~1 HEAD -- 'force-app/**' | while read FILE; do
                if echo "$FILE" | grep -qE 'force-app/main/default/objects/[^/]+/(fields|validationRules|recordTypes|listViews|compactLayouts|fieldSets|webLinks|sharingReasons|businessProcesses)/'; then
                  echo "$FILE" | sed -E 's|(force-app/main/default/objects/[^/]+)/.*|\1|'
                else
                  dirname "$FILE"
                fi
              done | sort -u | tr '\n' ',')
              DIRS="${DIRS%,}"
              echo "Deploy dirs: $DIRS"
              echo "deploy_dirs=$DIRS" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Validate Deployment (Check Only)
        if: |
          steps.changed_files.outputs.has_changes == 'true' &&
          (github.event.inputs.check_only == 'true')
        run: |
          echo "🔍 Running check-only validation for changed files..."
          IFS=',' read -ra DIRS <<< "${{ steps.changed_files.outputs.deploy_dirs }}"
          for DIR in "${DIRS[@]}"; do
            DIR=$(echo "$DIR" | xargs)  # trim whitespace
            echo "Validating: $DIR"
            sf project deploy start \
              --source-dir "$DIR" \
              --target-org target-org \
              --test-level ${{ github.event.inputs.test_level || 'NoTestRun' }} \
              --dry-run \
              --ignore-conflicts \
              --wait 30 \
              --json | tee deploy-result-validate.json

            STATUS=$(node -e "try{const d=require('fs').readFileSync('deploy-result-validate.json','utf8');console.log(JSON.parse(d).result?.status||'unknown')}catch(e){console.log('unknown')}")
            echo "Validation Status for $DIR: $STATUS"
            if [ "$STATUS" != "Succeeded" ]; then
              echo "❌ Validation failed for $DIR"
              cat deploy-result-validate.json
              exit 1
            fi
            echo "✅ Validation passed for $DIR"
          done

      - name: Deploy Changed Files to Salesforce
        if: |
          steps.changed_files.outputs.has_changes == 'true' &&
          (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.check_only != 'true'))
        run: |
          echo "🚀 Deploying only changed files to Salesforce..."
          echo "Changed files: ${{ steps.changed_files.outputs.changed_files }}"

          IFS=',' read -ra DIRS <<< "${{ steps.changed_files.outputs.deploy_dirs }}"
          OVERALL_STATUS="Succeeded"

          for DIR in "${DIRS[@]}"; do
            DIR=$(echo "$DIR" | xargs)  # trim whitespace
            if [ -d "$DIR" ]; then
              echo "Deploying: $DIR"
              sf project deploy start \
                --source-dir "$DIR" \
                --target-org target-org \
                --test-level ${{ github.event.inputs.test_level || 'NoTestRun' }} \
                --ignore-conflicts \
                --wait 30 \
                --json | tee deploy-result.json

              STATUS=$(node -e "try{const d=require('fs').readFileSync('deploy-result.json','utf8');console.log(JSON.parse(d).result?.status||'unknown')}catch(e){console.log('unknown')}")
              echo "Deploy Status for $DIR: $STATUS"

              if [ "$STATUS" != "Succeeded" ]; then
                echo "❌ Deployment failed for $DIR"
                cat deploy-result.json
                OVERALL_STATUS="Failed"
              else
                echo "✅ Deployed successfully: $DIR"
              fi
            else
              echo "⚠️ Directory not found (may have been deleted): $DIR"
            fi
          done

          if [ "$OVERALL_STATUS" != "Succeeded" ]; then
            exit 1
          fi

      - name: No changes to deploy
        if: steps.changed_files.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No Salesforce metadata files changed in this push. Nothing to deploy."

      - name: Upload Deploy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-results
          path: |
            deploy-result.json
            deploy-result-validate.json
          retention-days: 30
        continue-on-error: true

      - name: Post Deploy Summary
        if: always()
        run: |
          echo "=== DEPLOY SUMMARY ==="
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Changed files: ${{ steps.changed_files.outputs.changed_files }}"

          if [ -f deploy-result.json ]; then
            node -e "try{const r=JSON.parse(require('fs').readFileSync('deploy-result.json','utf8'));const res=r.result||{};console.log('Status:',res.status||'unknown');console.log('Components Deployed:',res.numberComponentsDeployed||0);console.log('Component Errors:',res.numberComponentErrors||0);console.log('Tests Run:',res.numberTestsCompleted||0);console.log('Test Errors:',res.numberTestErrors||0)}catch(e){console.log('Could not parse deploy result')}"
          fi
