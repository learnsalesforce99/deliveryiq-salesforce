<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us — EXL Service</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 560px;
        }
        .form-card h2 {
            color: #003366;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .form-card p.subtitle {
            color: #666666;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333333;
            margin-bottom: 5px;
        }
        label .required { color: #cc0000; }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            color: #333333;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #003366;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .submit-btn {
            width: 100%;
            padding: 13px;
            background-color: #003366;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #00509e;
        }
        .disclaimer {
            font-size: 11px;
            color: #999999;
            text-align: center;
            margin-top: 14px;
        }
    </style>
</head>
<body>

<!--
  ============================================================
  SCRUM-21: Web-To-Lead Form — EXL Service
  Generated by: DeliveryIQ Build Agent
  Date: 2026-06-24

  ADMIN SETUP REQUIRED BEFORE GO-LIVE:
  1. Replace YOUR_ORG_OID with your Salesforce Org ID.
     (Setup > Company Information > Salesforce.com Organization ID)
  2. Replace PRODUCT_INTEREST_FIELD_ID with the Salesforce-generated
     field ID for Product_Interest__c from Web-to-Lead Setup.
     (Setup > Web-to-Lead > Generate HTML > copy field id= value)
  3. Configure retURL: update the action URL and retURL value
     to match your production org domain.
  ============================================================
-->

<div class="form-card">
    <h2>Get in Touch</h2>
    <p class="subtitle">Fill out the form below and a member of our team will contact you shortly.</p>

    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8"
          method="POST">

        <!-- Hidden Salesforce Web-to-Lead fields -->
        <!-- ADMIN: Replace YOUR_ORG_OID with your actual Salesforce Org ID -->
        <input type="hidden" name="oid" value="YOUR_ORG_OID" />
        <input type="hidden" name="retURL" value="https://www.exlservice.com/" />
        <input type="hidden" name="lead_source" value="Web" />

        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name <span class="required">*</span></label>
                <input type="text" id="first_name" name="first_name"
                       maxlength="40" required placeholder="Jane" />
            </div>
            <div class="form-group">
                <label for="last_name">Last Name <span class="required">*</span></label>
                <input type="text" id="last_name" name="last_name"
                       maxlength="80" required placeholder="Smith" />
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email"
                   maxlength="80" required placeholder="jane.smith@company.com" />
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   maxlength="40" placeholder="+1 (555) 000-0000" />
        </div>

        <div class="form-group">
            <label for="company">Company <span class="required">*</span></label>
            <input type="text" id="company" name="company"
                   maxlength="40" required placeholder="Acme Corporation" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city"
                       maxlength="40" placeholder="New York" />
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state"
                       maxlength="20" placeholder="NY" />
            </div>
        </div>

        <div class="form-group">
            <label for="country">Country</label>
            <input type="text" id="country" name="country"
                   maxlength="40" placeholder="United States" />
        </div>

        <div class="form-group">
            <label for="PRODUCT_INTEREST_FIELD_ID">Product Interest</label>
            <!--
                ADMIN: Replace the `id` and `name` attribute values of this select
                with the actual Salesforce field ID for Product_Interest__c.
                Example: name="00N5e000004abc0" (from Web-to-Lead HTML generator).
            -->
            <select id="PRODUCT_INTEREST_FIELD_ID" name="PRODUCT_INTEREST_FIELD_ID">
                <option value="">-- Select an option --</option>
                <option value="Products">Products</option>
                <option value="Services">Services</option>
                <option value="Support">Support</option>
                <option value="Consulting">Consulting</option>
                <option value="Compliance">Compliance</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">Submit Enquiry</button>
        <p class="disclaimer">By submitting this form, you agree to be contacted by EXL Service regarding your enquiry.</p>
    </form>
</div>

</body>
</html>
